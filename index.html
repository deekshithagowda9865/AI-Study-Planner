<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyAI Pro - Advanced Study Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .timer-glow { box-shadow: 0 0 20px rgba(79, 70, 229, 0.2); }
        .dark .timer-glow { box-shadow: 0 0 30px rgba(99, 102, 241, 0.15); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen pb-20 md:pb-0 transition-colors duration-300">

    <!-- Header -->
    <header class="flex items-center justify-between p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2.5 rounded-xl text-white shadow-lg shadow-indigo-200 dark:shadow-none">
                <i data-lucide="brain-circuit" class="w-6 h-6"></i>
            </div>
            <div class="hidden sm:block">
                <h1 class="text-lg font-bold text-slate-800 dark:text-white leading-none">StudyAI Pro</h1>
                <span class="text-[10px] text-indigo-600 dark:text-indigo-400 font-bold uppercase tracking-wider">Advanced Planner</span>
            </div>
        </div>
        
        <nav class="hidden md:flex items-center gap-1 bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
            <button onclick="setView('dashboard')" id="nav-dashboard" class="px-4 py-2 text-sm font-semibold rounded-lg transition-all">Dashboard</button>
            <button onclick="setView('plan')" id="nav-plan" class="px-4 py-2 text-sm font-semibold rounded-lg transition-all">Roadmap</button>
            <button onclick="setView('focus')" id="nav-focus" class="px-4 py-2 text-sm font-semibold rounded-lg transition-all">Focus</button>
            <button onclick="setView('chat')" id="nav-chat" class="px-4 py-2 text-sm font-semibold rounded-lg transition-all">AI Buddy</button>
        </nav>

        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                <i data-lucide="sun" id="theme-icon-sun" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="moon" id="theme-icon-moon" class="w-5 h-5 block dark:hidden"></i>
            </button>
            <button onclick="resetApp()" class="p-2.5 rounded-xl bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400 hover:bg-rose-100 transition-all md:block hidden">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main id="app-container" class="max-w-5xl mx-auto p-4 md:p-8">
        <!-- Content injected here -->
    </main>

    <!-- Mobile Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white dark:bg-slate-900 border-t dark:border-slate-800 flex items-center justify-around px-4 z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
        <button onclick="setView('setup')" id="mob-setup" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="settings-2" class="w-5 h-5"></i><span class="text-[9px] font-bold">SETUP</span></button>
        <button onclick="setView('dashboard')" id="mob-dashboard" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span class="text-[9px] font-bold">STATS</span></button>
        <button onclick="setView('plan')" id="mob-plan" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="map" class="w-5 h-5"></i><span class="text-[9px] font-bold">MAP</span></button>
        <button onclick="setView('focus')" id="mob-focus" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="timer" class="w-5 h-5"></i><span class="text-[9px] font-bold">FOCUS</span></button>
        <button onclick="setView('chat')" id="mob-chat" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="bot" class="w-5 h-5"></i><span class="text-[9px] font-bold">AI</span></button>
    </nav>

    <!-- Loading -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-white/95 dark:bg-slate-950/95 backdrop-blur-md z-50 flex flex-col items-center justify-center text-center p-6">
        <div class="relative mb-8">
            <div class="w-20 h-20 border-[6px] border-indigo-100 dark:border-slate-800 border-t-indigo-600 rounded-full animate-spin"></div>
            <i data-lucide="zap" class="absolute inset-0 m-auto text-indigo-600 w-8 h-8 animate-pulse"></i>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white">Calculating Peak Performance...</h2>
        <p class="text-slate-500 dark:text-slate-400 max-w-xs mt-2">Crunching subjects and deadlines for your strategy.</p>
    </div>

    <script>
        const apiKey = "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";

        let state = {
            view: 'setup',
            theme: localStorage.getItem('theme') || 'light',
            subjects: [],
            examDate: '',
            hoursPerDay: 4,
            studyPlan: null,
            progress: {}, // Tracks sub-tasks using "dayIdx-blockIdx-subtaskIdx"
            focusDuration: 25,
            breakDuration: 5,
            timer: { minutes: 25, seconds: 0, isRunning: false, type: 'Work' },
            chatHistory: [{ role: 'ai', text: "Ready to optimize your study session?" }],
            isChatLoading: false
        };

        let timerInterval = null;

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // --- Theme Logic ---
        function applyTheme() {
            if (state.theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            localStorage.setItem('theme', state.theme);
        }

        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            applyTheme();
            render();
        }

        // --- Core Logic ---
        function setView(v) {
            state.view = v;
            updateNavUI();
            render();
        }

        function updateNavUI() {
            const views = ['dashboard', 'plan', 'focus', 'chat'];
            views.forEach(v => {
                const el = document.getElementById(`nav-${v}`);
                if (el) {
                    el.classList.toggle('bg-white', state.view === v);
                    el.classList.toggle('dark:bg-slate-700', state.view === v);
                    el.classList.toggle('text-indigo-600', state.view === v);
                    el.classList.toggle('dark:text-indigo-400', state.view === v);
                    el.classList.toggle('shadow-sm', state.view === v);
                    el.classList.toggle('text-slate-500', state.view !== v);
                }
                const mobEl = document.getElementById(`mob-${v}`);
                if (mobEl) mobEl.classList.toggle('text-indigo-600', state.view === v);
            });
            const mobSetup = document.getElementById('mob-setup');
            if (mobSetup) mobSetup.classList.toggle('text-indigo-600', state.view === 'setup');
        }

        async function callOpenAI(prompt, systemInstruction = "", responseSchema = null) {
            if (!apiKey) {
                throw new Error("Missing OpenAI API Key. Please add it to the code.");
            }

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    let finalSystemInstruction = systemInstruction;
                    
                    // If JSON response is required, append instructions so OpenAI knows exactly what to return
                    if (responseSchema) {
                        finalSystemInstruction += `\n\nYou MUST return ONLY valid JSON matching this exact schema. Do not include markdown formatting:\n${JSON.stringify(responseSchema)}`;
                    }

                    const payload = {
                        model: "gpt-4o-mini", // Using gpt-4o-mini for speed and cost efficiency
                        messages: [
                            ...(finalSystemInstruction ? [{ role: "system", content: finalSystemInstruction }] : []),
                            { role: "user", content: prompt }
                        ]
                    };
                    
                    if (responseSchema) {
                        payload.response_format = { type: "json_object" };
                    }

                    const response = await fetch(`https://api.openai.com/v1/chat/completions`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData?.error?.message || `HTTP ${response.status}`);
                    }
                    const data = await response.json();
                    
                    let text = data.choices?.[0]?.message?.content;
                    if (!text) throw new Error("API returned empty text");
                    
                    if (responseSchema) {
                        // Ensure no markdown formatting artifacts disrupt JSON parsing
                        text = text.replace(/```json/g, '').replace(/```/g, '').trim();
                        return JSON.parse(text);
                    }
                    
                    return text;
                } catch (err) {
                    console.error("OpenAI API Error:", err);
                    if (i === 4 || err.message.includes("API Key") || err.message.includes("Missing")) throw err;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        async function generatePlan() {
            if (state.subjects.length === 0 || !state.examDate) return showToast("Setup subjects & date first!");
            
            document.getElementById('loading-overlay').classList.remove('hidden');
            
            // Define an explicit, strict schema to guarantee the AI doesn't break the UI
            const roadmapSchema = {
                type: "object",
                properties: {
                    summary: { type: "string" },
                    days: {
                        type: "array",
                        items: {
                            type: "object",
                            properties: {
                                day: { type: "integer" },
                                date: { type: "string" },
                                focus: { type: "string" },
                                blocks: {
                                    type: "array",
                                    items: {
                                        type: "object",
                                        properties: {
                                            time: { type: "string" },
                                            topic: { type: "string" },
                                            action: { type: "string" },
                                            resources: { type: "string" },
                                            subTasks: { type: "array", items: { type: "string" } }
                                        },
                                        required: ["time", "topic", "action", "resources", "subTasks"]
                                    }
                                },
                                priority: { type: "string", enum: ["High", "Medium", "Low"] },
                                dailyGoal: { type: "string" }
                            },
                            required: ["day", "date", "focus", "blocks", "priority", "dailyGoal"]
                        }
                    },
                    milestones: {
                        type: "array",
                        items: {
                            type: "object",
                            properties: {
                                title: { type: "string" },
                                description: { type: "string" }
                            },
                            required: ["title", "description"]
                        }
                    },
                    globalTips: { type: "array", items: { type: "string" } }
                },
                required: ["summary", "days", "milestones", "globalTips"]
            };

            const systemPrompt = `You are an elite academic consultant building a foolproof study roadmap. Analyze the inputs and build a progressive schedule ensuring high retention and spaced repetition.`;
            const userPrompt = `Exam Date: ${state.examDate}. Daily Availability: ${state.hoursPerDay}h/day. Subjects & Granular Topics: ${JSON.stringify(state.subjects)}. Create detailed daily time-blocks breaking down the topics into specific sub-tasks.`;

            try {
                const plan = await callOpenAI(userPrompt, systemPrompt, roadmapSchema);
                state.studyPlan = plan;
                // Reset progress tracking when a new plan is generated
                state.progress = {};
                state.view = 'plan';
                render();
            } catch (e) {
                console.error(e);
                showToast(`Generation Failed: ${e.message}`);
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        function addSubject() {
            const name = document.getElementById('sub-name').value;
            const topics = document.getElementById('sub-topics').value;
            if (!name) return;
            state.subjects.push({
                name,
                topics: topics.split(',').map(t => t.trim()).filter(t => t),
                difficulty: document.getElementById('sub-diff').value
            });
            render();
        }

        function removeSubject(i) {
            state.subjects.splice(i, 1);
            render();
        }

        // --- Timer ---
        function updateTimerSettings(type, value) {
            let parsed = parseInt(value, 10);
            if (isNaN(parsed) || parsed < 1) parsed = 1;
            
            if (type === 'focus') state.focusDuration = parsed;
            if (type === 'break') state.breakDuration = parsed;

            // Apply immediately if timer is not running
            if (!state.timer.isRunning) {
                if ((type === 'focus' && state.timer.type === 'Work') || 
                    (type === 'break' && state.timer.type === 'Break')) {
                    state.timer.minutes = parsed;
                    state.timer.seconds = 0;
                }
                render();
            }
        }

        function toggleTimer() {
            if (state.timer.isRunning) {
                clearInterval(timerInterval);
                state.timer.isRunning = false;
            } else {
                state.timer.isRunning = true;
                timerInterval = setInterval(() => {
                    if (state.timer.seconds === 0) {
                        if (state.timer.minutes === 0) {
                            clearInterval(timerInterval);
                            handleTimerEnd();
                            return;
                        }
                        state.timer.minutes--;
                        state.timer.seconds = 59;
                    } else {
                        state.timer.seconds--;
                    }
                    renderTimerDisplay();
                }, 1000);
            }
            render();
        }

        function handleTimerEnd() {
            state.timer.isRunning = false;
            const isWork = state.timer.type === 'Work';
            state.timer.type = isWork ? 'Break' : 'Work';
            state.timer.minutes = isWork ? state.breakDuration : state.focusDuration;
            state.timer.seconds = 0;
            showToast(isWork ? "Work over! Time for a break." : "Break over! Back to focus.");
            render();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            state.timer = { 
                minutes: state.timer.type === 'Work' ? state.focusDuration : state.breakDuration, 
                seconds: 0, 
                isRunning: false, 
                type: state.timer.type 
            };
            render();
        }

        // --- Render Views ---
        function render() {
            applyTheme();
            const container = document.getElementById('app-container');
            
            if (state.view === 'setup') {
                container.innerHTML = `
                <div class="space-y-8 animate-in max-w-4xl mx-auto">
                    <div class="flex items-center gap-4 bg-indigo-50 dark:bg-indigo-900/20 p-6 rounded-3xl border border-indigo-100 dark:border-indigo-800/30">
                        <div class="bg-indigo-600 text-white p-4 rounded-2xl shadow-lg">
                            <i data-lucide="sparkles" class="w-8 h-8"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-extrabold text-indigo-950 dark:text-indigo-200">Knowledge Base</h2>
                            <p class="text-indigo-600 dark:text-indigo-400 font-medium text-sm">Define your syllabus to create an AI strategy.</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 space-y-6">

                            <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 space-y-4">
                                <h3 class="font-bold text-lg flex items-center gap-2 dark:text-white"><i data-lucide="plus-circle" class="w-5 h-5 text-indigo-500"></i> New Subject</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div class="space-y-1">
                                        <label class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1">Subject Name</label>
                                        <input id="sub-name" type="text" placeholder="e.g. Astrophysics" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium dark:text-white">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1">Difficulty</label>
                                        <select id="sub-diff" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium dark:text-white">
                                            <option>Easy</option>
                                            <option selected>Medium</option>
                                            <option>Hard</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1">Sub-topics</label>
                                    <textarea id="sub-topics" placeholder="Comma separated list..." class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium h-20 resize-none dark:text-white"></textarea>
                                </div>
                                <button onclick="addSubject()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 dark:shadow-none active:scale-[0.98]">
                                    <i data-lucide="plus" class="w-5 h-5"></i> Add to Roadmap
                                </button>
                            </div>

                            <div class="space-y-3">
                                ${state.subjects.map((s, i) => `
                                    <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-slate-200 dark:border-slate-800 flex items-start justify-between group hover:border-indigo-200 dark:hover:border-indigo-900 transition-all">
                                        <div class="space-y-1">
                                            <div class="flex items-center gap-2">
                                                <h4 class="font-bold text-slate-800 dark:text-slate-100">${s.name}</h4>
                                                <span class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-tighter ${s.difficulty === 'Hard' ? 'bg-rose-100 text-rose-600 dark:bg-rose-900/30 dark:text-rose-400' : 'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400'}">${s.difficulty}</span>
                                            </div>
                                            <p class="text-xs text-slate-500 dark:text-slate-400 line-clamp-1">${s.topics.join(', ') || 'No topics'}</p>
                                        </div>
                                        <button onclick="removeSubject(${i})" class="p-2 text-slate-300 hover:text-rose-500 transition-opacity md:opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                `).join('')}
                                ${state.subjects.length === 0 ? '<div class="text-center py-12 text-slate-400 dark:text-slate-600 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-3xl"><p class="font-medium">No subjects yet</p></div>' : ''}
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-slate-900 dark:bg-slate-900 text-white p-6 rounded-3xl shadow-xl space-y-6 border border-white/5">
                                <h3 class="font-bold text-lg flex items-center gap-2"><i data-lucide="target" class="w-5 h-5 text-indigo-400"></i> The Schedule</h3>
                                <div class="space-y-4">
                                    <div>
                                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Exam Date</label>
                                        <input type="date" value="${state.examDate}" onchange="state.examDate = this.value" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl outline-none focus:border-indigo-400 text-white">
                                    </div>
                                    <div>
                                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Study Time: <span class="text-indigo-400">${state.hoursPerDay}h/day</span></label>
                                        <input type="range" min="1" max="14" value="${state.hoursPerDay}" oninput="state.hoursPerDay = this.value; render()" class="w-full h-1.5 bg-white/10 rounded-full appearance-none cursor-pointer accent-indigo-400">
                                    </div>
                                </div>
                                <button onclick="generatePlan()" class="w-full py-4 bg-indigo-500 text-white rounded-2xl font-extrabold flex items-center justify-center gap-2 hover:bg-indigo-400 active:scale-95 transition-all">
                                    <i data-lucide="cpu" class="w-5 h-5"></i> GENERATE PLAN
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'plan') {
                if (state.studyPlan) {
                    container.innerHTML = `
                    <div class="space-y-8 animate-in pb-24">
                        <div class="flex flex-col lg:flex-row justify-between items-start gap-6">
                            <div class="space-y-2">
                                <div class="flex items-center gap-2 text-indigo-600 dark:text-indigo-400 font-bold text-xs uppercase tracking-widest"><i data-lucide="map" class="w-4 h-4"></i> Strategy Phase</div>
                                <h2 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Your Detailed Roadmap</h2>
                                <p class="text-slate-500 dark:text-slate-400 max-w-2xl text-sm leading-relaxed">${state.studyPlan.summary}</p>
                            </div>
                            <div class="bg-white dark:bg-slate-900 px-6 py-4 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm text-center min-w-[140px]">
                                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Total Completion</p>
                                <p class="text-2xl font-black text-indigo-600 dark:text-indigo-400">${calculateCompletion()}%</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div class="lg:col-span-2 relative pt-4 pb-12">
                                <div class="absolute top-0 bottom-0 left-[2.5rem] md:left-[3.5rem] w-2 -ml-1 bg-gradient-to-b from-indigo-200 via-indigo-400 to-rose-400 dark:from-indigo-900 dark:via-indigo-600 dark:to-rose-800 rounded-full z-0"></div>

                                <div class="space-y-12 relative z-10">
                                    <!-- START NODE -->
                                    <div class="relative flex items-center min-h-[3rem]">
                                        <div class="absolute left-[2.5rem] md:left-[3.5rem] -ml-6 w-12 h-12 bg-white dark:bg-slate-900 border-4 border-indigo-300 dark:border-slate-700 rounded-full flex items-center justify-center shadow-md z-10">
                                            <i data-lucide="flag" class="w-5 h-5 text-indigo-500"></i>
                                        </div>
                                        <div class="pl-[4.5rem] md:pl-[6.5rem]">
                                            <h3 class="font-black text-xl text-slate-800 dark:text-slate-200 uppercase tracking-widest">Start Journey</h3>
                                            <p class="text-xs font-bold text-indigo-500">Today</p>
                                        </div>
                                    </div>

                                    ${state.studyPlan.days.map((day, dIdx) => `
                                        <div class="relative group">
                                            <!-- Day Node Marker -->
                                            <div class="absolute left-[2.5rem] md:left-[3.5rem] top-8 -ml-5 w-10 h-10 bg-indigo-600 border-4 border-white dark:border-slate-950 rounded-full flex flex-col items-center justify-center shadow-lg shadow-indigo-300 dark:shadow-none z-10 transition-transform group-hover:scale-110 group-hover:bg-indigo-500">
                                                <span class="text-[10px] font-black text-white leading-none">D${day.day}</span>
                                            </div>
                                            
                                            <!-- Horizontal connector -->
                                            <div class="absolute left-[2.5rem] md:left-[3.5rem] top-12 w-8 md:w-12 h-1 bg-indigo-200 dark:bg-slate-700 -z-10 group-hover:bg-indigo-400 dark:group-hover:bg-indigo-500 transition-colors"></div>

                                            <!-- Day Card -->
                                            <div class="ml-[4.5rem] md:ml-[6.5rem] bg-white dark:bg-slate-900 rounded-[2rem] border-2 border-slate-100 dark:border-slate-800 overflow-hidden shadow-md transition-all group-hover:shadow-xl group-hover:-translate-y-1 group-hover:border-indigo-200 dark:group-hover:border-slate-700">
                                                <div class="p-5 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between ${day.priority === 'High' ? 'bg-rose-50/50 dark:bg-rose-950/20' : 'bg-slate-50/50 dark:bg-slate-800/20'}">
                                                    <div class="flex items-center gap-4">
                                                        <div>
                                                            <h4 class="font-black text-slate-900 dark:text-white text-lg">${day.focus}</h4>
                                                            <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">${day.date} • <span class="text-indigo-600 dark:text-indigo-400 font-bold">${day.dailyGoal}</span></p>
                                                        </div>
                                                    </div>
                                                    <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${day.priority === 'High' ? 'bg-rose-100 text-rose-600' : 'bg-indigo-100 text-indigo-600 dark:bg-indigo-900/40 dark:text-indigo-400'} shadow-sm">${day.priority}</span>
                                                </div>
                                                <div class="p-3 md:p-5 space-y-4">
                                                    ${day.blocks.map((block, bIdx) => `
                                                        <div class="flex flex-col gap-3 p-4 rounded-2xl transition-all border border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/40">
                                                            <div class="flex justify-between items-center mb-1">
                                                                <span class="text-[10px] font-bold text-slate-400 tracking-tight uppercase"><i data-lucide="clock" class="w-3 h-3 inline pb-0.5"></i> ${block.time}</span>
                                                                <span class="text-[9px] font-black text-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 px-2 py-0.5 rounded-md uppercase tracking-wider">${block.action}</span>
                                                            </div>
                                                            <h5 class="font-bold text-slate-800 dark:text-slate-200 text-sm">${block.topic}</h5>
                                                            
                                                            <!-- Render Sub-Tasks Here -->
                                                            <div class="space-y-2 mt-2 pl-2 border-l-2 border-slate-200 dark:border-slate-700">
                                                                ${block.subTasks ? block.subTasks.map((st, stIdx) => `
                                                                    <div onclick="toggleTask(${dIdx}, ${bIdx}, ${stIdx})" class="flex items-start gap-3 cursor-pointer group">
                                                                        <div class="mt-0.5 w-4 h-4 rounded-md border flex items-center justify-center shrink-0 transition-colors ${state.progress[`${dIdx}-${bIdx}-${stIdx}`] ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300 dark:border-slate-600 group-hover:border-indigo-400'}">
                                                                            ${state.progress[`${dIdx}-${bIdx}-${stIdx}`] ? '<i data-lucide="check" class="w-3 h-3"></i>' : ''}
                                                                        </div>
                                                                        <span class="text-xs font-medium ${state.progress[`${dIdx}-${bIdx}-${stIdx}`] ? 'text-slate-400 line-through' : 'text-slate-600 dark:text-slate-300'}">${st}</span>
                                                                    </div>
                                                                `).join('') : '<p class="text-xs text-slate-400 italic">No specific sub-tasks designated.</p>'}
                                                            </div>

                                                            <p class="text-[10px] text-slate-400 mt-2 italic bg-slate-100/50 dark:bg-slate-900/50 p-2 rounded-lg"><i data-lucide="search" class="w-3 h-3 inline mr-1"></i>${block.resources}</p>
                                                        </div>
                                                    `).join('')}
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}

                                    <!-- GOAL NODE -->
                                    <div class="relative flex items-center min-h-[4rem] mt-8">
                                        <div class="absolute left-[2.5rem] md:left-[3.5rem] -ml-7 w-14 h-14 bg-gradient-to-br from-rose-400 to-rose-600 border-4 border-white dark:border-slate-950 rounded-full flex items-center justify-center shadow-lg shadow-rose-200 dark:shadow-none z-10">
                                            <i data-lucide="trophy" class="w-6 h-6 text-white"></i>
                                        </div>
                                        <div class="pl-[4.5rem] md:pl-[6.5rem]">
                                            <h3 class="font-black text-xl text-slate-800 dark:text-slate-200 uppercase tracking-widest">Exam Day</h3>
                                            <p class="text-xs font-bold text-rose-500">${state.examDate}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-6">
                                <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm sticky top-24">
                                    <h3 class="font-bold text-lg mb-6 flex items-center gap-2 dark:text-white"><i data-lucide="trophy" class="w-5 h-5 text-amber-500"></i> Milestones</h3>
                                    <div class="space-y-6">
                                        ${state.studyPlan.milestones.map((m, i) => `
                                            <div class="relative pl-6 border-l-2 border-slate-100 dark:border-slate-800 pb-2">
                                                <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full border-2 border-white dark:border-slate-900 bg-indigo-600"></div>
                                                <h5 class="font-bold text-sm text-slate-800 dark:text-slate-200 leading-none mb-1">${m.title}</h5>
                                                <p class="text-xs text-slate-500 dark:text-slate-400">${m.description}</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                } else {
                    container.innerHTML = `
                    <div class="text-center py-24 space-y-4 animate-in">
                        <i data-lucide="map" class="w-16 h-16 text-slate-300 dark:text-slate-700 mx-auto"></i>
                        <h2 class="text-2xl font-bold dark:text-white">No Roadmap Yet</h2>
                        <p class="text-slate-500 dark:text-slate-400">Head to the Setup screen to generate your AI study plan.</p>
                        <button onclick="setView('setup')" class="mt-4 px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors">Go to Setup</button>
                    </div>`;
                }
            } else if (state.view === 'focus') {
                container.innerHTML = `
                <div class="max-w-xl mx-auto py-12 space-y-12 animate-in text-center">
                    <div class="space-y-4">
                        <h2 class="text-3xl font-black text-slate-900 dark:text-white">Deep Work Mode</h2>
                        <p class="text-slate-500 dark:text-slate-400">Eliminate distractions. Customize your flow below.</p>
                    </div>

                    <div class="bg-white dark:bg-slate-900 p-8 md:p-12 rounded-[3rem] border border-slate-200 dark:border-slate-800 shadow-2xl timer-glow transition-all">
                        <div class="flex flex-col items-center space-y-8">
                            <span class="px-4 py-1 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-full text-xs font-black uppercase tracking-widest">${state.timer.type} SESSION</span>
                            <div class="text-[100px] font-black tabular-nums text-slate-900 dark:text-white leading-none tracking-tight">
                                ${String(state.timer.minutes).padStart(2, '0')}:${String(state.timer.seconds).padStart(2, '0')}
                            </div>
                            <div class="flex gap-4">
                                <button onclick="toggleTimer()" class="w-20 h-20 bg-indigo-600 text-white rounded-3xl flex items-center justify-center hover:bg-indigo-700 shadow-lg shadow-indigo-200 active:scale-90 transition-all">
                                    <i data-lucide="${state.timer.isRunning ? 'pause' : 'play'}" class="w-8 h-8"></i>
                                </button>
                                <button onclick="resetTimer()" class="w-20 h-20 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-3xl flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700 active:scale-90 transition-all">
                                    <i data-lucide="rotate-ccw" class="w-8 h-8"></i>
                                </button>
                            </div>
                            
                            <!-- Timer Configuration -->
                            <div class="flex gap-6 mt-6 pt-6 border-t border-slate-100 dark:border-slate-800 w-full justify-center">
                                <div class="flex flex-col items-center">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Focus (min)</label>
                                    <input type="number" min="1" max="120" value="${state.focusDuration}" onchange="updateTimerSettings('focus', this.value)" class="w-20 p-2 text-center bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white font-bold transition-all">
                                </div>
                                <div class="flex flex-col items-center">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Break (min)</label>
                                    <input type="number" min="1" max="60" value="${state.breakDuration}" onchange="updateTimerSettings('break', this.value)" class="w-20 p-2 text-center bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white font-bold transition-all">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'dashboard') {
                container.innerHTML = `
                <div class="space-y-8 animate-in">
                    <h2 class="text-3xl font-black text-slate-900 dark:text-white">Performance Analytics</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Progress</p>
                            <p class="text-4xl font-black text-indigo-600 dark:text-indigo-400">${calculateCompletion()}%</p>
                            <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full mt-4 overflow-hidden"><div class="bg-indigo-600 h-full transition-all duration-1000" style="width: ${calculateCompletion()}%"></div></div>
                        </div>
                        <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Intensity</p>
                            <p class="text-4xl font-black dark:text-white">${state.hoursPerDay}h</p>
                            <p class="text-[10px] text-slate-400 mt-2 font-bold uppercase">DAILY TARGET</p>
                        </div>
                        <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Topics</p>
                            <p class="text-4xl font-black text-amber-500">${state.subjects.length}</p>
                            <p class="text-[10px] text-slate-400 mt-2 font-bold uppercase">COURSES TRACKED</p>
                        </div>
                        <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Focus Mode</p>
                            <p class="text-4xl font-black text-rose-500">Peak</p>
                            <p class="text-[10px] text-slate-400 mt-2 font-bold uppercase">CONSISTENCY SCORE</p>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm space-y-6">
                        <h3 class="font-bold text-lg dark:text-white">Mastery Breakdown</h3>
                        <div class="space-y-6">
                            ${state.subjects.map(s => `
                                <div class="space-y-2">
                                    <div class="flex justify-between items-end">
                                        <h4 class="font-bold text-slate-800 dark:text-slate-200 text-sm">${s.name}</h4>
                                        <span class="text-[10px] font-bold text-indigo-500 uppercase">${s.difficulty}</span>
                                    </div>
                                    <div class="flex gap-1 h-3">
                                        ${Array(12).fill(0).map((_, i) => `<div class="flex-1 rounded-sm ${i < (s.difficulty === 'Hard' ? 10 : s.difficulty === 'Medium' ? 6 : 3) ? 'bg-indigo-500' : 'bg-slate-100 dark:bg-slate-800'}"></div>`).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            } else if (state.view === 'chat') {
                container.innerHTML = `
                <div class="h-[calc(100vh-220px)] flex flex-col bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-2xl overflow-hidden animate-in">
                    <div class="p-5 bg-indigo-600 text-white flex items-center gap-4">
                        <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-sm"><i data-lucide="bot" class="w-6 h-6"></i></div>
                        <div>
                            <h3 class="font-black text-lg">AI Strategy Hub</h3>
                            <p class="text-[10px] text-indigo-100 uppercase font-bold tracking-[0.2em]">Contextual Tutor</p>
                        </div>
                    </div>
                    <div id="chat-scroller" class="flex-1 overflow-y-auto p-6 space-y-6 bg-[#FDFDFF] dark:bg-slate-950 custom-scrollbar">
                        ${state.chatHistory.map(m => `
                            <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                                <div class="max-w-[85%] p-4 rounded-3xl text-sm leading-relaxed whitespace-pre-wrap ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white dark:bg-slate-800 dark:text-slate-200 border border-slate-200 dark:border-slate-700 shadow-sm rounded-tl-none text-slate-700 font-medium'}">${m.isLoading ? '<div class="flex gap-1.5 py-1.5"><span class="w-2 h-2 bg-slate-400 dark:bg-slate-500 rounded-full animate-bounce" style="animation-delay: 0ms"></span><span class="w-2 h-2 bg-slate-400 dark:bg-slate-500 rounded-full animate-bounce" style="animation-delay: 150ms"></span><span class="w-2 h-2 bg-slate-400 dark:bg-slate-500 rounded-full animate-bounce" style="animation-delay: 300ms"></span></div>' : escapeHTML(m.text)}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="p-6 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 flex gap-3">
                        <input id="chat-input" type="text" placeholder="Ask about concepts or your plan..." class="flex-1 p-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-medium dark:text-white disabled:opacity-50 disabled:cursor-not-allowed" ${state.isChatLoading ? 'disabled' : ''}>
                        <button onclick="handleSendChat()" class="p-4 bg-indigo-600 text-white rounded-2xl shadow-lg active:scale-95 transition-all disabled:opacity-50 disabled:active:scale-100 disabled:cursor-not-allowed" ${state.isChatLoading ? 'disabled' : ''}><i data-lucide="send" class="w-5 h-5"></i></button>
                    </div>
                </div>`;
                setTimeout(() => { 
                    const scroller = document.getElementById('chat-scroller');
                    if (scroller) scroller.scrollTop = scroller.scrollHeight;
                    if (!state.isChatLoading) {
                        const input = document.getElementById('chat-input');
                        if (input) input.focus();
                    }
                }, 50);
            }
            lucide.createIcons();
        }

        async function handleSendChat() {
            if (state.isChatLoading) return;
            
            const inp = document.getElementById('chat-input');
            const txt = inp.value.trim();
            if (!txt) return;
            
            state.chatHistory.push({ role: 'user', text: txt });
            state.chatHistory.push({ role: 'ai', text: '', isLoading: true });
            state.isChatLoading = true;
            inp.value = '';
            render();
            
            try {
                const chatContext = state.chatHistory.filter(m => !m.isLoading).map(m => `${m.role.toUpperCase()}: ${m.text}`).join('\n');
                const fullPrompt = `Conversation History:\n${chatContext}\n\nCurrent Subject Context: ${JSON.stringify(state.subjects)}\n\nRespond directly to the last USER message. Provide helpful, concise academic advice. Do not prepend "AI:" to your response.`;
                
                // Pass 'null' for the schema parameter so the bot returns conversational text, not JSON
                const res = await callOpenAI(fullPrompt, "You are a helpful AI study buddy.", null);
                
                state.chatHistory.pop(); // Remove loading message
                state.chatHistory.push({ role: 'ai', text: res });
            } catch (e) {
                state.chatHistory.pop(); // Remove loading message
                state.chatHistory.push({ role: 'ai', text: `Sorry, I hit an error: ${e.message}` });
            } finally {
                state.isChatLoading = false;
                render();
            }
        }

        // Updated to track sub-task completion specifically
        function toggleTask(dIdx, bIdx, stIdx) {
            const key = `${dIdx}-${bIdx}-${stIdx}`;
            state.progress[key] = !state.progress[key];
            render();
        }

        // Accurately calculates completion percentage based on total granular sub-tasks
        function calculateCompletion() {
            if (!state.studyPlan || !state.studyPlan.days) return 0;
            
            let totalTasks = 0;
            state.studyPlan.days.forEach(day => {
                if (day.blocks) {
                    day.blocks.forEach(block => {
                        // Count subtasks, fallback to 1 if the block somehow doesn't have them
                        totalTasks += (block.subTasks && block.subTasks.length > 0) ? block.subTasks.length : 1;
                    });
                }
            });
            
            if (totalTasks === 0) return 0;
            
            const doneTasks = Object.values(state.progress).filter(Boolean).length;
            return Math.round((doneTasks / totalTasks) * 100) || 0;
        }

        function showToast(m) {
            const t = document.createElement('div');
            t.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-8 py-4 rounded-2xl shadow-2xl z-50 font-bold text-sm flex items-center gap-3 animate-in";
            t.innerHTML = `<i data-lucide="bell" class="w-4 h-4"></i> ${m}`;
            document.body.appendChild(t);
            lucide.createIcons();
            setTimeout(() => t.remove(), 4000);
        }

        function resetApp() {
            if (confirm("Reset application?")) {
                state = { 
                    view: 'setup', 
                    theme: state.theme, 
                    subjects: [], 
                    examDate: '', 
                    hoursPerDay: 4, 
                    studyPlan: null, 
                    progress: {}, 
                    focusDuration: 25,
                    breakDuration: 5,
                    timer: { minutes: 25, seconds: 0, isRunning: false, type: 'Work' }, 
                    chatHistory: [{ role: 'ai', text: "System Reset." }], 
                    isChatLoading: false 
                };
                render();
            }
        }

        function renderTimerDisplay() {
            const el = document.querySelector('.tabular-nums');
            if (el) el.innerText = `${String(state.timer.minutes).padStart(2, '0')}:${String(state.timer.seconds).padStart(2, '0')}`;
        }

        window.onload = () => { render(); updateNavUI(); };
        document.addEventListener('keypress', (e) => { if (e.key === 'Enter' && state.view === 'chat') handleSendChat(); });
    </script>
</body>
</html>
